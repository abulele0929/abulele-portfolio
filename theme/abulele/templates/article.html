{% extends "base.html" %}
{% block title %}{{ article.title }} - Abulele{% endblock %}
{% block content %}
<article class="page">
  <header>
    <p class="post-eyebrow">{{ article.category }} / <time datetime="{{ article.date.isoformat() }}">{{ article.date|strftime('%d %B %Y') }}</time></p>
    <h1 class="post-h2">{{ article.title }}</h1>
  </header>
  <div class="progress-bar" id="progress-bar"></div>
  <div class="post-body">
    {{ article.content }}
  </div>
  <nav>
    <a href="{{ SITEURL }}/blog.html" class="post-btn post-btn-ghost">Back to all posts</a>
  </nav>
</article>
{% endblock %}
